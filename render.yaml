services:
  - type: web
    name: festival-finder
    runtime: python
    plan: starter
    buildCommand: python -m pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/festival_finder.db
      - key: UPLOAD_ROOT
        value: /var/data/uploads
      - key: PYTHON_VERSION
        value: 3.12.9
    disk:
      name: festival-finder-data
      mountPath: /var/data
      sizeGB: 1
